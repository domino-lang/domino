name: Test Nix Flake

on:
  pull_request: {}
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build:
    name: Run Nix Build & Checks
    runs-on:
      - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: "Nix: Check"
        run: nix build --print-build-logs && nix flake check . --print-build-logs
      - name: "Nix: Run Known-Good Tests"
        run: nix develop --command bash -c 'DOMINO=$(type -p domino) bash scripts/test-known-examples.sh'
