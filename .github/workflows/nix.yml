name: Test Nix Flake

on:
  pull_request: {}
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build:
    name: Nix Build & Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build
        run: nix build --print-build-logs
      - name: Check
        run: nix flake check . --print-build-logs

  nix-updated-toolchain:
    name: Updated toolchain quick checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # A new toolchain breaking our build is informative, not a reason to
    # block merges. Drop this line if you'd rather gate PRs on it.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Update flake inputs
        run: nix flake update
      - name: Quick checks against updated toolchain
        run: |
          system="$(nix eval --impure --raw --expr 'builtins.currentSystem')"
          nix build --print-build-logs \
            ".#checks.$system.treefmt" \
            ".#checks.$system.cargo-check" \
            ".#checks.$system.clippy"
