name: Run Known-Good Proofs

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-proofs-linux:
    runs-on: ${{ matrix.os }}
    name: Check Proofs (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v2
      - name: Install CVC5
        run: sudo apt install cvc5

      - name: Install Enough TexLive
        run: sudo apt install --no-install-recommends texlive-base texlive-science texlive-latex-extra

      - name: Build Domino
        run: |
          cargo build --release -p domino
          echo "DOMINO=$(pwd)/target/release/domino">>$GITHUB_ENV

      - name: Run proofs
        run: "./scripts/test-known-examples.sh || exit 1"

      - name: Check for SMT stability
        run: "./scripts/test-for-stability.sh || exit 1"

      - uses: actions/upload-artifact@v4
        with:
          name: Project PDFs
          path: ./example-projects/**/_build/latex/Theorem_*.pdf
          retention-days: 14

      - uses: actions/upload-artifact@v7
        with:
          name: smt-output-${{ matrix.os }}
          path: example-projects/simple-KEM-example/_build/code_eq/
          retention-days: 2

  check-proofs-windows:
    runs-on: ${{ matrix.os }}
    name: Check Proofs (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v2
      - name: Install CVC5
        shell: bash
        run: |
          choco install wget
          wget https://github.com/cvc5/cvc5/releases/download/cvc5-1.3.3/cvc5-Win64-x86_64-static.zip
          7z e cvc5-Win64-x86_64-static.zip cvc5-Win64-x86_64-static/bin/cvc5.exe
          echo "${{ github.workspace }}" >> $GITHUB_PATH

      - name: Install Enough TexLive
        shell: bash
        run: |
          choco install texlive || choco install texlive
          C:/texlive/*/bin/windows/tlmgr.bat install cryptocode mathtools xcolor pgf xargs xkeyval forloop pbox varwidth environ bigfoot environ trimspaces
          echo C:/texlive/*/bin/windows >> $GITHUB_PATH

      - name: Build Domino
        shell: bash
        run: |
          cargo build --release -p domino
          echo "DOMINO=$(pwd)/target/release/domino">>$GITHUB_ENV

      - name: Run proofs
        run: |
          ./scripts/test-known-examples.sh || exit 1
        shell: bash
        env:
          DOMINO: "${{ github.workspace }}/target/release/domino"

      - name: Check for SMT stability
        run: |
          ./scripts/test-for-stability.sh || exit 1
        shell: bash
        env:
          DOMINO: "${{ github.workspace }}/target/release/domino"

      - uses: actions/upload-artifact@v4
        with:
          name: Project PDFs
          path: ./example-projects/**/_build/latex/Theorem_*.pdf
          retention-days: 14

      - uses: actions/upload-artifact@v7
        with:
          name: smt-output-${{ matrix.os }}
          path: example-projects/simple-KEM-example/_build/code_eq/
          retention-days: 2

  check-proofs-macos:
    runs-on: ${{ matrix.os }}
    name: Check Proofs (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - macos-26-intel
    steps:
      - uses: actions/checkout@v2
      - name: Install CVC5
        run: brew install --cask cvc5/cvc5/cvc5

      - name: Install Enough TexLive
        run: brew install texlive

      - name: Build Domino
        run: |
          cargo build --release -p domino
          echo "DOMINO=$(pwd)/target/release/domino">>$GITHUB_ENV

      - name: Run proofs
        run: "./scripts/test-known-examples.sh || exit 1"

      - name: Check for SMT stability
        run: "./scripts/test-for-stability.sh || exit 1"

      - uses: actions/upload-artifact@v4
        with:
          name: Project PDFs
          path: ./example-projects/**/_build/latex/Theorem_*.pdf
          retention-days: 14

      - uses: actions/upload-artifact@v7
        with:
          name: smt-output-${{ matrix.os }}
          path: example-projects/simple-KEM-example/_build/code_eq/
          retention-days: 2

  check-cross-stability:
    runs-on: ubuntu-latest
    name: Check SMT Stability over different OS Choices
    needs: [check-proofs-macos, check-proofs-windows, check-proofs-linux]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: smt-output-*
          merge-multiple: false
      - run: for i in smt-output-* ; do echo $i ; diff -ur smt-output-ubuntu-latest $i || touch fail-$i ; done
      - run: if test -f fail-* ; then exit 1 ; fi
