name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.91.1"

jobs:
  Fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set the rust toolchain version to known-working version
        run: rustup override set ${{ env.RUST_VERSION }}
      - name: Add rustfmt for override version
        run: rustup component add rustfmt
      - name: Tool versions
        run: |
          cargo --version
          cargo fmt -- --version
      - name: Run cargo fmt
        run: cargo fmt --check
  Fmt_Latest:
    runs-on: ubuntu-latest
    name: Fmt (latest rust)
    steps:
      - uses: actions/checkout@v4
      - name: Tool versions
        run: |
          cargo --version
          cargo fmt -- --version
      - name: Run cargo fmt
        run: cargo fmt --check
  Check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set the rust toolchain version to known-working version
        run: rustup override set ${{ env.RUST_VERSION }}
      - name: Tool versions
        run: |
          cargo --version
      - name: Run cargo check
        run: RUSTFLAGS="-D warnings" cargo check --workspace --verbose
  Check_Latest:
    runs-on: ubuntu-latest
    name: Check (latest rust)
    steps:
      - uses: actions/checkout@v4
      - name: Tool versions
        run: |
          cargo --version
      - name: Run cargo check
        run: RUSTFLAGS="-D warnings" cargo check --workspace --verbose
  Tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set the rust toolchain version to known-working version
        run: rustup override set ${{ env.RUST_VERSION }}
      - name: Tool versions
        run: |
          cargo --version
      - name: Run cargo test
        run: cargo test --workspace --verbose
  Tests_Latest:
    runs-on: ubuntu-latest
    name: Tests (latest rust)
    steps:
      - uses: actions/checkout@v4
      - name: Tool versions
        run: |
          cargo --version
      - name: Run cargo test
        run: cargo test --workspace --verbose
  Clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set the rust toolchain version to known-working version
        run: rustup override set ${{ env.RUST_VERSION }}
      - name: Add clippy for override version
        run: rustup component add clippy
      - name: Tool versions
        run: |
          rustc --version
          cargo --version
          cargo clippy -- --version
      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings
  Clippy_Latest:
    runs-on: ubuntu-latest
    name: Clippy (latest rust)
    steps:
      - uses: actions/checkout@v4
      - name: Tool versions
        run: |
          rustc --version
          cargo --version
          cargo clippy -- --version
      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings
